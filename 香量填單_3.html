<!DOCTYPE html>
<html lang="zh-Hant"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>神奇學苑 · 香量線上填單</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700;900&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#f6f2ea;--bg2:#fbf8f1;--panel:#fff;--line:#e2d8c4;--gold:#9c7e3a;--gold2:#7a6228;--cream:#3a3024;--txt:#2e2820;--mut:#8a7e6a;--green:#3fa86b;--red:#c0392b;--fs:16px}
.dark{--bg:#1f1d1a;--bg2:#272320;--panel:#2c2723;--line:#473f36;--gold:#c9a961;--gold2:#e0c585;--cream:#f4e9c8;--txt:#f0ece2;--mut:#9c9486;--green:#7fae6e;--red:#d9776a}
.big{--fs:19px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font-family:'Noto Sans TC',sans-serif;font-size:var(--fs);line-height:1.55;min-height:100vh;background-image:radial-gradient(circle at 12% 8%,rgba(156,126,58,.06),transparent 42%),radial-gradient(circle at 88% 96%,rgba(156,126,58,.05),transparent 46%)}
.wrap{max-width:780px;margin:0 auto;padding:16px 14px 100px}
header.top{display:flex;justify-content:space-between;align-items:flex-end;border-bottom:2px solid var(--gold);padding-bottom:12px;flex-wrap:wrap;gap:8px}
h1{font-family:'Noto Serif TC',serif;font-weight:900;color:var(--gold2);font-size:1.4em;letter-spacing:1px}
h1 small{display:block;font-size:.44em;color:var(--mut);letter-spacing:3px;font-weight:500;margin-top:4px}
.who{font-family:'Noto Serif TC',serif;font-weight:900;color:#fff;background:var(--gold);border-radius:9px;padding:7px 14px;font-size:1em}
.toggles button{background:var(--panel);color:var(--txt);border:1px solid var(--line);border-radius:7px;padding:6px 10px;cursor:pointer;font-size:.8em;margin-left:5px;font-family:inherit}
.bar{display:flex;gap:12px;align-items:center;flex-wrap:wrap;background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--gold);border-radius:10px;padding:12px 15px;margin:14px 0}
.bar label{color:var(--gold2);font-family:'Noto Serif TC',serif;font-weight:700;margin-right:6px}
.bar input{background:var(--bg);border:1px solid var(--line);color:var(--txt);border-radius:7px;padding:8px 11px;font-family:inherit;font-size:1em}
#status{margin-left:auto;font-size:.82em;color:var(--mut)}#status.ok{color:var(--green)}#status.err{color:var(--red)}
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin:14px 0 4px}
.tab{flex:1;min-width:84px;background:var(--panel);border:1px solid var(--line);color:var(--txt);border-radius:10px 10px 0 0;padding:11px 6px;cursor:pointer;font-family:'Noto Serif TC',serif;font-weight:700;font-size:1em;text-align:center}
.tab.active{background:var(--gold);color:#fff;border-color:var(--gold)}
.card{background:var(--bg2);border:1px solid var(--line);border-radius:0 14px 14px 14px;margin:0 0 16px;padding:18px}
.card h2{font-family:'Noto Serif TC',serif;font-size:1.05em;color:var(--cream);font-weight:700;display:flex;align-items:center;gap:8px;margin-bottom:3px}
.card h2 .n{background:var(--gold);color:#fff;width:22px;height:22px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-weight:900;font-size:.7em}
.sub{color:var(--mut);font-size:.8em;margin:2px 0 14px;line-height:1.5}
.field{margin-bottom:13px}
.field>label{display:block;color:var(--gold2);font-weight:700;font-size:.9em;margin-bottom:5px}
.field .req{color:var(--red);margin-left:3px}
.field input,.field select{width:100%;background:var(--panel);border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:11px 12px;font-family:inherit;font-size:1.02em}
.field input:focus,.field select:focus{outline:none;border-color:var(--gold)}
.field.miss input,.field.miss select{border-color:var(--red);background:rgba(192,57,43,.05)}
.ymd{display:flex;gap:7px;align-items:center;flex-wrap:wrap}
.ymd .cal{flex:0 0 78px}.ymd .seg{flex:1;min-width:58px;display:flex;align-items:center;gap:4px}
.ymd .seg input{text-align:center}.ymd .seg span{color:var(--mut);font-size:.85em}
.fhint{color:var(--gold2);font-size:.78em;margin-top:4px;background:rgba(156,126,58,.08);border-radius:6px;padding:5px 9px}
.fhint:empty{display:none}
.grouphd{font-family:'Noto Serif TC',serif;color:var(--gold2);font-weight:700;font-size:.88em;margin:16px 0 9px;padding-left:8px;border-left:3px solid var(--gold)}
.itembox{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:13px}
.fitem{position:relative;background:var(--bg2);border:1px solid var(--line);border-radius:11px;padding:13px 12px 12px;margin-bottom:11px}
.fi-del{position:absolute;top:8px;right:8px;background:transparent;border:1px solid var(--line);color:var(--red);font-size:.8em;cursor:pointer;padding:5px 9px;border-radius:7px;font-family:inherit}
.fi-item{width:100%;background:var(--panel);border:1px solid var(--line);color:var(--txt);border-radius:9px;padding:12px 11px;font-family:inherit;font-size:1.05em;margin-bottom:10px}
.fi-qrow{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.fi-qlabel{color:var(--gold2);font-weight:700;font-size:.92em;margin-right:auto}
.fi-step{width:46px;height:46px;border-radius:10px;border:1px solid var(--line);background:var(--panel);color:var(--gold2);font-size:24px;font-weight:700;cursor:pointer;line-height:1;font-family:inherit}
.fi-step:active{background:var(--gold);color:#fff}
.fi-qty{width:66px;height:46px;text-align:center;font-size:1.2em;background:var(--panel);border:1px solid var(--line);color:var(--txt);border-radius:9px;font-family:inherit}
.fi-qty:focus{outline:none;border-color:var(--gold)}
.fi-wish{width:100%;background:var(--panel);border:1px solid var(--line);color:var(--txt);border-radius:9px;padding:10px 11px;font-family:inherit;font-size:.98em}
.fi-wish:focus{outline:none;border-color:var(--gold)}
.additem{background:transparent;border:1px dashed var(--gold);color:var(--gold);border-radius:8px;padding:8px;width:100%;cursor:pointer;font-family:'Noto Serif TC';font-weight:700;font-size:.92em}
.actions{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap}
.btn{background:var(--gold);color:#fff;border:none;border-radius:9px;padding:13px 24px;font-size:1.04em;font-weight:700;cursor:pointer;font-family:'Noto Serif TC',serif;letter-spacing:1px;flex:1;min-width:130px}
.btn:hover{background:var(--gold2)}.btn:disabled{opacity:.5;cursor:not-allowed}
.btn.ghost{background:transparent;color:var(--gold);border:1px solid var(--gold);flex:0 0 auto;min-width:0;padding:13px 16px}
.listcard{background:var(--bg2);border:1px solid var(--line);border-radius:14px;padding:16px}
.catgroup{margin-bottom:14px}
.catgroup h3{font-family:'Noto Serif TC',serif;color:var(--gold2);font-size:.95em;margin-bottom:6px;display:flex;justify-content:space-between}
.catgroup h3 .c{color:var(--mut);font-weight:400;font-size:.85em}
.entry{display:flex;align-items:center;justify-content:space-between;gap:8px;background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:9px 12px;margin-bottom:6px}
.entry .info{flex:1;min-width:0;font-size:.92em}
.entry .info small{color:var(--mut);display:block;font-size:.82em;margin-top:1px}
.entry.ed{outline:2px solid var(--gold)}
.rowbtn{background:transparent;border:none;cursor:pointer;font-size:.9em;padding:3px 6px;font-family:inherit}
.rowbtn.e{color:var(--gold2)}.rowbtn.d{color:var(--red)}
.empty{color:var(--mut);text-align:center;padding:18px;font-size:.9em}
.totbar{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#fff;border-radius:11px;padding:13px 16px;margin-top:12px;font-size:.92em;line-height:1.7}
.totbar b{font-size:1.15em}
.totbar .items{font-size:.84em;opacity:.92;margin-top:5px;border-top:1px solid rgba(255,255,255,.25);padding-top:5px}
.banner{border-radius:9px;padding:11px 14px;margin:8px 0;font-size:.88em;line-height:1.5}
.banner.info{background:rgba(156,126,58,.12);border-left:3px solid var(--gold);color:var(--gold2)}
.toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%) translateY(80px);background:var(--gold2);color:#fff;padding:12px 22px;border-radius:30px;font-weight:700;box-shadow:0 6px 20px rgba(0,0,0,.25);opacity:0;transition:.3s;z-index:99;font-size:.92em}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
</style></head>
<body>
<div class="wrap">
<header class="top">
  <h1>香量線上填單<small>MIIRAGIC · 香量回報</small></h1>
  <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
    <span class="who" id="whoBadge" style="display:none"></span>
    <button id="logoutBtn" onclick="logout()" style="display:none;background:transparent;border:1px solid var(--line);color:var(--mut);border-radius:7px;padding:6px 10px;cursor:pointer;font-family:inherit;font-size:.8em">登出</button>
    <span class="toggles"><button onclick="theme('light')">☀</button><button onclick="theme('dark')">☾</button><button onclick="bigfont()">A±</button></span>
  </div>
</header>

<div id="setupNote"></div>
<div id="login" style="display:none">
  <div class="card" style="border-radius:14px;max-width:430px;margin:24px auto">
    <h2><span class="n">🔑</span>老師登入</h2>
    <p class="sub">請選擇您的姓名並輸入密碼。</p>
    <div class="field"><label>老師<span class="req">*</span></label><select id="loginTeacher"></select></div>
    <div class="field"><label>密碼<span class="req">*</span></label><input type="password" id="loginPw" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <div class="actions"><button class="btn" onclick="doLogin()">進入</button></div>
    <div id="loginErr" style="display:none"></div>
  </div>
</div>

<div id="app" style="display:none">
<div class="bar">
  <div><label>結算月份</label><select id="month" onchange="onMonth()" style="background:var(--bg);border:1px solid var(--line);color:var(--txt);border-radius:7px;padding:8px 11px;font-family:inherit;font-size:1em"></select></div>
  <span id="status">—</span>
</div>
<div class="tabs" id="tabs"></div>
<div class="card">
  <h2><span class="n">＋</span><span id="formTitle">新增明細</span></h2>
  <p class="sub" id="formSub"></p>
  <div id="formFields"></div>
  <div class="actions">
    <button class="btn" id="submitBtn" onclick="submitForm()">加入清單</button>
    <button class="btn ghost" onclick="clearForm()">清空</button>
    <button class="btn ghost" id="cancelBtn" style="display:none" onclick="cancelEdit()">取消編輯</button>
  </div>
</div>
<div class="listcard">
  <h2 style="font-family:'Noto Serif TC';color:var(--cream);font-size:1.05em;margin-bottom:4px">📋 本月已填清單</h2>
  <p class="sub">最底「總計」就是會寫進香量統計總表、被獎金系統抓走的數字，可直接核對。</p>
  <div id="listArea"><p class="empty">尚未載入。</p></div>
  <div id="totArea"></div>
</div>
</div>
</div>
<div class="toast" id="toast"></div>

<script>
/* ====== 後端網址（部署 Apps Script 後貼 /exec 網址） ====== */
const API_URL = 'https://script.google.com/macros/s/AKfycbwSM81dVKy_ZkFdQneulQKv7m13rfYe8xonhBFPI6T1sASw3A2Q3rBNjJ1oY3MsOPIYZw/exec';
/* ========================================================= */

/* ★ 老師清單與編號 ★  新增老師：加一行 {name:'姓名',no:22}，密碼自動＝123+編號，後端自動納入 */
let TEACHERS=[
 {name:'陳捷容',no:1},{name:'羅文勳',no:2},{name:'陳彩綺',no:3},{name:'蕭竣方',no:4},
 {name:'湯雯莉',no:5},{name:'沈佳琪',no:6},{name:'周冠榮',no:7},{name:'蕭鎧峻',no:8},
 {name:'賴素貞',no:9},{name:'張簡玉靖',no:10},{name:'梁凱妍',no:11},{name:'鄭聖勳',no:12},
 {name:'謝欣諭',no:13},{name:'王宥心',no:14},{name:'熊卿妃',no:15},{name:'鐘宥涵',no:16},
 {name:'謝承殷',no:17},{name:'陳昕昀',no:18},{name:'林雅涵',no:19},{name:'公司內部',no:20},
 {name:'靈應壇',no:21}
];
let TBYNAME={}; function rebuildT(){TBYNAME={};TEACHERS.forEach(t=>TBYNAME[t.name]=t);} rebuildT();
function pwOf(no){return '123'+no;}

/* 各老師收單人(下線)清單；沒列的老師不顯示此欄 */
let TEACHER_SHOUDAN={'羅文勳':['院長','子瑄','包年','章宴','釧益','旂彰','瑋齊'],'陳彩綺':['彩綺','冠穎','晏蓉','茜茹','豐州'],'湯雯莉':['莫莉','柏雅'],'王宥心':['玥希','宥心']};

const ITEMS=['補財','補庫','補運(消災解厄)','夫妻(金姻緣)','貴人(木姻緣)','單身(水姻緣)','和合(火姻緣)','同性(土姻緣)','冤親(解冤釋結)','化小人','招貴人'];
const FAHUI_ITEMS=ITEMS.concat(['天赦金']);
const FAHUI_NOBIRTH=['天赦金'];   /* ← 這些法會項目「免填生日」；其餘項目生日必填 */
const SHICHEN=[{v:'',t:'—'},{v:'子',t:'子（23–01時）'},{v:'丑',t:'丑（01–03時）'},{v:'寅',t:'寅（03–05時）'},{v:'卯',t:'卯（05–07時）'},{v:'辰',t:'辰（07–09時）'},{v:'巳',t:'巳（09–11時）'},{v:'午',t:'午（11–13時）'},{v:'未',t:'未（13–15時）'},{v:'申',t:'申（15–17時）'},{v:'酉',t:'酉（17–19時）'},{v:'戌',t:'戌（19–21時）'},{v:'亥',t:'亥（21–23時）'},{v:'吉',t:'吉（不知時辰用）'},{v:'不知',t:'不知'}];
const CATS_ORDER=['法會','斗燈','還陰債','祭改','普桌'];

/* 後端欄位（與 Code.gs 一致；collect 依此逐欄收集）*/
const COLS={
 '法會':['收單人','公司行號','項目','份數','姓名','生日別','生日年','生日月','生日日','時辰','居住地址','祈願','備註'],
 '斗燈':['收單人','加購類型','斗種','份數','姓名','生日年','生日月','生日日','時辰','居住地址','令牌字或祈願'],
 '還陰債':['收單人','牒文類別','份數','陽世報恩人','報恩人居住地址','祈願','亡者生日年','亡者生日月','亡者生日日','時辰','卒于年','卒于月','卒于日','歲數','姓','公姑娘媽','名','考妣','神位地址','先祖名'],
 '祭改':['收單人','公司行號','份數','姓名','生日別','生日年','生日月','生日日','時辰','居住地址','性別','衣服'],
 '普桌':['公司行號','份數','姓名','居住地址','備註','捐掉或寄回']
};

/* 法會客戶欄位（項目另由多項目區處理）*/
const FAHUI_CUST=[
 {sh:1,k:'收單人',type:'select',from:'shoudan'},
 {k:'姓名',type:'text',req:1},
 {type:'ymd',cal:1,conv:1,y:'生日年',m:'生日月',d:'生日日',calk:'生日別',label:'生日',rk:'生日年'},
 {k:'時辰',type:'select',opts:SHICHEN},
 {k:'居住地址',type:'text',req:1},
 {k:'公司行號',type:'text'},
 {k:'備註',type:'text'}
];

/* 斗燈/祭改/普桌 通用欄位 */
const FIELDS={
 '祭改':[
   {sh:1,k:'收單人',label:'收單人/下線老師',type:'select',from:'shoudan'},
   {k:'份數',type:'num',req:1,def:1},
   {k:'姓名',type:'text',req:1},
   {type:'ymd',cal:1,conv:1,y:'生日年',m:'生日月',d:'生日日',calk:'生日別',label:'生日'},
   {k:'時辰',type:'select',opts:SHICHEN},
   {k:'居住地址',type:'text',req:1},
   {k:'性別',type:'select',opts:['','男','女'],req:1},
   {k:'衣服',type:'select',opts:['','有','無']},
   {k:'公司行號',type:'text'}
 ],
 '普桌':[
   {k:'份數',type:'num',req:1,def:1},
   {k:'姓名',type:'text',req:1},
   {k:'居住地址',type:'text',req:1},
   {k:'捐掉或寄回',type:'select',opts:['','捐掉','寄回'],req:1},
   {k:'公司行號',type:'text',label:'公司行號(公司填名稱+負責人)'},
   {k:'備註',type:'text',label:'備註(想上疏文的家人姓名)'}
 ]
};

/* 還陰債：固定欄 + 依牒文類別動態亡者明細 */
const YIN_TOP=[
 {sh:1,k:'收單人',type:'select',from:'shoudan'},
 {k:'牒文類別',type:'select',opts:['','個人正魂','冤親債主','歷代祖先','地基主','嬰靈','獸魂','辭祖'],req:1,onchg:'renderYinDetail'},
 {k:'份數',type:'num',req:1,def:1},
 {k:'陽世報恩人',label:'陽世報恩人(報名者)',type:'text',req:1,oninp:'yinAuto'},
 {k:'報恩人居住地址',type:'text',req:1},
 {k:'祈願',type:'text',max:50}
];
const YDEF={
 '生日':{type:'ymd',y:'亡者生日年',m:'亡者生日月',d:'亡者生日日',label:'亡者生日(國曆)'},
 '時辰':{k:'時辰',type:'select',opts:SHICHEN,label:'時辰'},
 '卒於':{type:'ymd',y:'卒于年',m:'卒于月',d:'卒于日',label:'亡者卒於(國曆)'},
 '歲數':{k:'歲數',type:'num',label:'歲數(國曆計算)'},
 '姓':{k:'姓',type:'text'},
 '稱':{k:'公姑娘媽',type:'select',opts:['','公','姑娘','媽'],label:'公/姑娘/媽'},
 '名':{k:'名',type:'text'},
 '考妣':{k:'考妣',type:'select',opts:['','考','妣'],label:'考/妣'},
 '神位':{k:'神位地址',type:'text',hint:'神'},
 '祖名':{k:'先祖名',type:'text',hint:'祖'}
};
const YINCAT={
 '個人正魂':{order:['生日','時辰','卒於','歲數','姓','稱','名','考妣','神位','祖名'],allReq:true},
 '冤親債主':{order:['祖名'],req:['先祖名']},
 '歷代祖先':{order:['神位','祖名'],req:['神位地址','先祖名']},
 '地基主':{order:['神位','祖名'],req:['神位地址','先祖名']},
 '嬰靈':{order:['祖名'],req:['先祖名']},
 '獸魂':{order:['祖名'],req:['先祖名']},
 '辭祖':{order:['神位','祖名'],req:['神位地址','先祖名']}
};
const YINHINT_TXT={
 '個人正魂':{神:'填牌位或塔位地址',祖:'姓氏+(公/媽)+名　ex：王公小明'},
 '冤親債主':{祖:'姓氏+前世今生之冤親債主'},
 '歷代祖先':{神:'祖先牌位地址',祖:'祖先姓氏+九玄七祖歷代祖先'},
 '地基主':{神:'要施作的地址',祖:'直接填「地基主」'},
 '嬰靈':{祖:'媽媽姓氏+嬰靈　ex：林氏嬰靈'},
 '獸魂':{祖:'獸魂（知道名字則填名字）'},
 '辭祖':{神:'前夫祖先牌位地址',祖:'前夫姓氏+歷代祖先'}
};
const CATDESC={'法會':'先勾選項目與份數（可多個），再填一次客戶資料。','斗燈':'選加購類型後，下方跳出對應欄位（令牌加購無斗種；令牌／五行需填令牌字）。','還陰債':'選牒文類別後，下方會跳出該類別要填的欄位（各有必填）。','祭改':'','普桌':'公司請於公司行號填名稱+負責人。'};

function lLeapMonth(y){return lunarInfo[y-1900]&0xf;}
function lLeapDays(y){return lLeapMonth(y)?((lunarInfo[y-1900]&0x10000)?30:29):0;}
function lMonthDays(y,m){return (lunarInfo[y-1900]&(0x10000>>m))?30:29;}
function lYearDays(y){let s=348;for(let i=0x8000;i>0x8;i>>=1)s+=(lunarInfo[y-1900]&i)?1:0;return s+lLeapDays(y);}
function solar2lunar(y,m,d){
  if(y<1900||y>2100)return null;
  let offset=Math.floor((Date.UTC(y,m-1,d)-Date.UTC(1900,0,31))/86400000);
  let i,temp=0,ly;
  for(i=1900;i<2101&&offset>0;i++){temp=lYearDays(i);offset-=temp;}
  if(offset<0){offset+=temp;i--;}
  ly=i;const leap=lLeapMonth(i);let isLeap=false;
  for(i=1;i<13&&offset>0;i++){
    if(leap>0&&i===leap+1&&!isLeap){--i;isLeap=true;temp=lLeapDays(ly);}
    else temp=lMonthDays(ly,i);
    if(isLeap&&i===leap+1)isLeap=false;
    offset-=temp;
  }
  if(offset===0&&leap>0&&i===leap+1){if(isLeap)isLeap=false;else{isLeap=true;--i;}}
  if(offset<0){offset+=temp;--i;}
  return {lYear:ly,lMonth:i,lDay:offset+1,isLeap:isLeap};
}
/* 民國國曆 → 民國農曆字串 */
function s2lMinguo(my,mm,dd){
  my=parseInt(my);mm=parseInt(mm);dd=parseInt(dd);
  if(!my||!mm||!dd)return null;
  const greg = my>=1000 ? my : my+1911;   // 4位數視為西元，其餘視為民國
  const r=solar2lunar(greg,mm,dd);if(!r)return null;
  return {y:r.lYear-1911,m:(r.isLeap?'閏':'')+r.lMonth,d:r.lDay};
}
/* 收集時：若選國曆則換算成農曆存入 */
function applyLunar(cat,o){
  if(['法會','祭改','斗燈'].indexOf(cat)<0)return;
  if(val('生日別')==='國'){
    const r=s2lMinguo(o['生日年'],o['生日月'],o['生日日']);
    if(r){o['生日年']=r.y;o['生日月']=r.m;o['生日日']=r.d;}
  }
  if('生日別' in o)o['生日別']='農';
}
/* 即時換算預覽 */
function birthPrev(yk,mk,dk,ck){
  const el=document.getElementById('prev_'+yk);if(!el)return;
  if((ck?val(ck):'農')!=='國'){el.textContent='';return;}
  const r=s2lMinguo(val(yk),val(mk),val(dk));
  el.textContent=r?('→ 換算農曆：'+r.y+'年'+r.m+'月'+r.d+'日（將以此存入疏文）'):'';
}

/* 通用欄位 HTML */
function fieldHTML(f,reqOverride){
  if(f.group)return `<div class="grouphd">${f.group}</div>`;
  if(f.sh&&!TEACHER_SHOUDAN[TEACHER])return '';
  const req=(reqOverride!=null?reqOverride:f.req);
  const lab=(f.label||f.k)+(req?'<span class="req">*</span>':'');
  if(f.type==='ymd'){
    const cb=f.conv?` onchange="birthPrev('${f.y}','${f.m}','${f.d}','${f.calk}')"`:'';
    const oi=f.conv?` oninput="birthPrev('${f.y}','${f.m}','${f.d}','${f.calk}')"`:'';
    let seg='';
    if(f.cal)seg+=`<select class="cal" id="in_${f.calk}"${cb}><option value="國">國曆</option><option value="農">農曆</option></select>`;
    seg+=`<span class="seg"><input type="number" id="in_${f.y}" placeholder="年"${oi}><span>年</span></span>`;
    seg+=`<span class="seg"><input type="number" id="in_${f.m}" placeholder="月"${oi}><span>月</span></span>`;
    seg+=`<span class="seg"><input type="number" id="in_${f.d}" placeholder="日"${oi}><span>日</span></span>`;
    let h=`<div class="field" data-k="${f.rk||f.y}"><label>${f.label}${req?'<span class="req">*</span>':''}${f.conv?'<span style="font-weight:400;color:var(--mut);font-size:.82em">　西元或民國皆可，不知農曆填國曆自動換算</span>':''}</label><div class="ymd">${seg}</div>`;
    if(f.conv)h+=`<div class="fhint" id="prev_${f.y}"></div>`;
    return h+`</div>`;
  }
  if(f.type==='select'){
    const opts=(f.from==='shoudan'?[''].concat(TEACHER_SHOUDAN[TEACHER]||[]):f.opts)||[];
    const optHTML=opts.map(o=>{const v=(o&&typeof o==='object')?o.v:o;const t=(o&&typeof o==='object')?o.t:(o||'—');return `<option value="${v}">${t}</option>`;}).join('');
    let h=`<div class="field" data-k="${f.k}"><label>${lab}</label><select id="in_${f.k}"${f.onchg?` onchange="${f.onchg}()"`:''}>${optHTML}</select>`;
    if(f.hint)h+=`<div class="fhint" id="hint_${f.hint}"></div>`;
    return h+`</div>`;
  }
  const labx=lab+(f.max?`<span style="font-weight:400;color:var(--mut);font-size:.8em">（限${f.max}字，最好30字內）</span>`:'');
  let h=`<div class="field" data-k="${f.k}"><label>${labx}</label><input type="${f.type==='num'?'number':'text'}" id="in_${f.k}"${f.def!=null?` value="${f.def}"`:''}${f.max?` maxlength="${f.max}"`:''}${f.oninp?` oninput="${f.oninp}()"`:''}>`;
  if(f.hint)h+=`<div class="fhint" id="hint_${f.hint}"></div>`;
  return h+`</div>`;
}

/* 驗證；回傳缺漏欄位陣列 */
function validateSingle(o){
  clearMiss();let miss=[];
  const need=requiredOf(CURCAT,o);
  need.forEach(k=>{if(!(''+(o[k]||'')).trim()){miss.push(k);markMiss(k);}});
  return miss;
}
function requiredOf(cat,o){
  if(cat==='還陰債'){const base=['牒文類別','份數','陽世報恩人','報恩人居住地址'];const cfg=YINCAT[o['牒文類別']];if(!cfg)return base;
    if(cfg.allReq){let r=base.slice();cfg.order.forEach(nm=>{const def=YDEF[nm];if(def.k)r.push(def.k);if(def.type==='ymd')r.push(def.y,def.m,def.d);});return r;}
    return base.concat(cfg.req||[]);}
  if(cat==='斗燈'){let r=['加購類型','份數','姓名','居住地址'];const cf=DOUCONF[o['加購類型']];if(cf)r=r.concat(cf.req);return r;}
  if(cat==='祭改')return ['份數','姓名','居住地址','性別'];
  if(cat==='普桌')return ['份數','姓名','居住地址','捐掉或寄回'];
  if(cat==='法會'){ // 編輯單筆
    let r=['項目','份數','姓名','居住地址'];
    if(FAHUI_NOBIRTH.indexOf(o['項目'])<0)r=r.concat(['生日年','生日月','生日日']);
    return r;
  }
  return [];
}

function submitForm(){
  if(!API_URL){toast('尚未設定 API_URL');return;}
  if(CURCAT==='法會'&&!EDIT.id)return submitFahui();
  const o=collectSingle();const miss=validateSingle(o);
  if(miss.length){toast('必填：'+miss.join('、'));return;}
  const btn=document.getElementById('submitBtn');btn.disabled=true;btn.textContent='送出中…';
  const payload=Object.assign({action:EDIT.id?'update':'add'},o);
  if(EDIT.id){payload['編號']=EDIT.id;payload.category=EDIT.cat;}
  fetch(API_URL,{method:'POST',body:JSON.stringify(payload)}).then(r=>r.json()).then(d=>{
    if(d.ok){DATA=d.data||DATA;TOTALS=d.totals||TOTALS;toast(EDIT.id?'已更新 ✓':'已加入 ✓');cancelEdit(true);clearForm();renderList();setStatus('已連線','ok');}
    else toast('失敗：'+(d.error||'未知'));
  }).catch(e=>toast('連線失敗')).finally(()=>{btn.disabled=false;btn.textContent=EDIT.id?'更新':'加入清單';});
}
/* 法會多項目送出 */
function submitFahui(){
  clearMiss();
  const cust={};FAHUI_CUST.forEach(f=>{if(f.type==='ymd'){cust[f.y]=val(f.y);cust[f.m]=val(f.m);cust[f.d]=val(f.d);if(f.cal)cust[f.calk]=val(f.calk);}else if(!(f.sh&&!TEACHER_SHOUDAN[TEACHER]))cust[f.k]=val(f.k);});
  let items=getItemRows().filter(it=>it.項目&&it.份數>0);
  let miss=[];
  if(!items.length){toast('請至少選一個項目（份數≥1）');return;}
  if(!cust['姓名']){miss.push('姓名');markMiss('姓名');}
  if(!cust['居住地址']){miss.push('居住地址');markMiss('居住地址');}
  const needBirth=items.some(it=>FAHUI_NOBIRTH.indexOf(it.項目)<0);
  if(needBirth&&!(val('生日年')&&val('生日月')&&val('生日日'))){miss.push('生日');markMiss('生日年');}
  if(miss.length){toast('必填：'+miss.join('、'));return;}
  applyLunar('法會',cust);
  const rows=items.map(it=>Object.assign({},cust,{項目:it.項目,份數:it.份數,祈願:it.祈願||''}));
  const btn=document.getElementById('submitBtn');btn.disabled=true;btn.textContent='送出中…';
  fetch(API_URL,{method:'POST',body:JSON.stringify({action:'addBatch',category:'法會',month:MONTH,teacher:TEACHER,rows:rows})}).then(r=>r.json()).then(d=>{
    if(d.ok){DATA=d.data||DATA;TOTALS=d.totals||TOTALS;toast('已加入 '+rows.length+' 筆 ✓');clearForm();renderList();setStatus('已連線','ok');}
    else toast('失敗：'+(d.error||'未知'));
  }).catch(e=>toast('連線失敗')).finally(()=>{btn.disabled=false;btn.textContent='加入清單';});
}
function clearForm(){renderForm();const fn=document.getElementById('in_姓名')||document.getElementById('in_陽世報恩人');if(fn)fn.focus();}

function startEdit(cat,id){
  const e=(DATA[cat]||[]).find(x=>String(x.編號)===String(id));if(!e)return;
  selectCat(cat);EDIT={cat,id};renderForm();
  COLS[cat].forEach(c=>setv(c,e[c]));
  if(cat==='還陰債')renderYinDetail(),COLS[cat].forEach(c=>setv(c,e[c]));
  if(cat==='斗燈')renderDouDetail(),COLS[cat].forEach(c=>setv(c,e[c]));
  const cb=document.getElementById('in_生日別');if(cb)cb.value='農';
  const pv=document.getElementById('prev_生日年');if(pv)pv.textContent='';
  if(cat==='法會')fahuiEditWish();
  document.getElementById('formTitle').textContent='編輯：'+(e.姓名||e.陽世報恩人||'');
  document.getElementById('submitBtn').textContent='更新';
  document.getElementById('cancelBtn').style.display='';
  document.querySelector('.card').scrollIntoView({behavior:'smooth',block:'start'});
  renderList();
}
function setv(id,v){const e=document.getElementById('in_'+id);if(e)e.value=(v==null?'':v);}
function cancelEdit(silent){EDIT={cat:null,id:null};document.getElementById('formTitle').textContent='新增明細';document.getElementById('submitBtn').textContent='加入清單';document.getElementById('cancelBtn').style.display='none';if(!silent){renderForm();renderList();}}

function delEntry(cat,id,name){
  if(!confirm('確定刪除「'+(name||'這一筆')+'」？無法復原。'))return;
  fetch(API_URL,{method:'POST',body:JSON.stringify({action:'delete',category:cat,'編號':id,month:MONTH,teacher:TEACHER})}).then(r=>r.json()).then(d=>{
    if(d.ok){DATA=d.data||{};TOTALS=d.totals||{};if(EDIT.id===id)cancelEdit(true);renderList();toast('已刪除');}
    else toast('刪除失敗：'+(d.error||''));
  }).catch(e=>toast('連線失敗'));
}

function onMonth(){MONTH=document.getElementById('month').value.trim();cancelEdit(true);loadList();}
function setStatus(t,c){const s=document.getElementById('status');s.textContent=t;s.className=c||'';}
function loadList(){
  if(!API_URL){renderList();return;}
  setStatus('讀取中…','');
  fetch(`${API_URL}?action=list&teacher=${encodeURIComponent(TEACHER)}&month=${encodeURIComponent(MONTH)}`).then(r=>r.json()).then(d=>{
    if(d.ok){DATA=d.data||{};TOTALS=d.totals||{};renderList();const n=CATS_ORDER.reduce((s,c)=>s+((DATA[c]||[]).length),0);setStatus('已連線 · '+n+' 筆','ok');}
    else setStatus('讀取失敗','err');
  }).catch(e=>setStatus('連線失敗（檢查 API 網址/部署權限）','err'));
}
function esc(s){return (''+(s==null?'':s)).replace(/'/g,'').replace(/</g,'');}
function entryLabel(cat,e){
  if(cat==='法會')return [e.姓名||'(未填)', `${e.項目||''} ×${e.份數||0}${e.祈願?' · 祈願:'+e.祈願:''}`];
  if(cat==='斗燈')return [e.姓名||'(未填)', `${e.斗種||''}（${e.加購類型||''}）×${e.份數||0}`];
  if(cat==='還陰債')return [e.陽世報恩人||'(未填)', `${e.牒文類別||''} ×${e.份數||0}`];
  if(cat==='祭改')return [e.姓名||'(未填)', `祭改 ×${e.份數||0} ${e.性別||''}`];
  if(cat==='普桌')return [e.姓名||'(未填)', `普桌 ×${e.份數||0} ${e.捐掉或寄回||''}`];
  return [e.姓名||'',''];
}
function renderList(){
  const area=document.getElementById('listArea');let h='';let total=0;
  CATS_ORDER.forEach(cat=>{const rows=DATA[cat]||[];if(!rows.length)return;total+=rows.length;
    const sum=rows.reduce((s,e)=>s+(parseFloat(e.份數)||0),0);
    h+=`<div class="catgroup"><h3>${cat}<span class="c">${rows.length} 筆 · 共 ${sum} 份</span></h3>`;
    rows.forEach(e=>{const lb=entryLabel(cat,e);const chg=e.異動?' <span style="color:var(--red);font-size:.78em">●已改</span>':'';
      h+=`<div class="entry${EDIT.id===e.編號?' ed':''}"><div class="info">${lb[0]}${chg}<small>${lb[1]}</small></div>
      <div><button class="rowbtn e" onclick="startEdit('${cat}','${e.編號}')">編輯</button><button class="rowbtn d" onclick="delEntry('${cat}','${e.編號}','${esc(lb[0])}')">刪</button></div></div>`;});
    h+=`</div>`;
  });
  area.innerHTML= total?h:'<p class="empty">本月尚無資料，從上面選類別新增第一筆。</p>';
  renderTotals();
}
function renderTotals(){
  const t=TOTALS||{};const ta=document.getElementById('totArea');
  if(!Object.keys(t).length){ta.innerHTML='';return;}
  const itline=ITEMS.map(i=>`${i.replace(/\(.*\)/,'')} ${t[i]||0}`).join('　');
  ta.innerHTML=`<div class="totbar">本月彙總（寫進統計總表）<br>
  萬寶小計 <b>${t['萬寶小計']||0}</b>　天赦 <b>${t['天赦金']||0}</b>　還陰債 <b>${t['還陰債']||0}</b>　年斗 <b>${t['年斗']||0}</b>　季斗 <b>${t['季斗']||0}</b>　令牌 <b>${t['令牌']||0}</b>　祭改 <b>${t['祭改']||0}</b>　普桌 <b>${t['普桌']||0}</b>
  <div class="items">萬寶金11項：${itline}</div></div>`;
}
let tt;function toast(m){const e=document.getElementById('toast');e.textContent=m;e.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>e.classList.remove('show'),2300);}

init();
</script></body></html>
